services:
  - type: web
    name: jiinueloan
    runtime: python
    plan: free
    pythonVersion: "3.11"
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        sync: false        # means you set the value manually in the Render dashboard
      - key: PYTHON_VERSION
        value: "3.11"
